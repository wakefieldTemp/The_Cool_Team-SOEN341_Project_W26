name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  php-ci:
    runs-on: ubuntu-latest
    container: 
      image: composer:latest
      volumes:
        - ${{github.workspace}}:/app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Validate PHP syntax (basic sanity)
        run: |
          echo "Running syntax check (non-fatal for missing files)..."
          find . -type f -name "*.php" -print0 | xargs -0 -n 1 php -l

      - name: Install dependencies (if composer.json exists)
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --no-progress --prefer-dist
          else
            echo "No composer.json found; skipping composer install."
          fi

      - name: Running compose install
        run: ./vendor/bin/phpunit tests



      - name: Empty tests (placeholder)
        run: |
          echo "No tests yet — placeholder step."
          exit 0
